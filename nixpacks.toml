[phases.setup]
  nixPkgs = ["nodejs_22"]
  aptPkgs = []

  [phases.install]
  cmds = ["npm install -g pnpm@10 && pnpm install --no-frozen-lockfile"]

  [phases.build]
  cmds = ["pnpm --filter @workspace/api-server run build"]
  dependsOn = ["install"]

  [start]
  cmd = "node --enable-source-maps artifacts/api-server/dist/index.mjs"
  