kind = "web"
previewPath = "/"
title = "RepurposeAI"
version = "1.0.0"
id = "artifacts/repurpose-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18298

[services.development]
run = "pnpm --filter @workspace/repurpose-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/repurpose-ai", "run", "build" ]
publicDir = "artifacts/repurpose-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18298"
BASE_PATH = "/"
