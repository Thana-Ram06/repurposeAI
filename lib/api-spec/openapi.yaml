openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: RepurposeAI API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: generate
    description: Content generation operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /generate:
    post:
      operationId: generateContent
      tags: [generate]
      summary: Generate repurposed content
      description: Generate multiple content formats from input text
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateRequest"
      responses:
        "200":
          description: Successfully generated content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /history:
    get:
      operationId: getHistory
      tags: [generate]
      summary: Get generation history
      description: Returns a list of past generations
      responses:
        "200":
          description: List of past generations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HistoryResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    GenerateRequest:
      type: object
      properties:
        text:
          type: string
          description: The input text or transcript to repurpose
        tone:
          type: string
          enum: [casual, professional, viral]
          description: The tone of the generated content
      required:
        - text
        - tone
    GenerateResponse:
      type: object
      properties:
        id:
          type: string
        tweets:
          type: array
          items:
            type: string
        linkedin:
          type: string
        blog:
          type: string
        hooks:
          type: array
          items:
            type: string
        captions:
          type: array
          items:
            type: string
        createdAt:
          type: string
      required:
        - id
        - tweets
        - linkedin
        - blog
        - hooks
        - captions
        - createdAt
    HistoryItem:
      type: object
      properties:
        id:
          type: string
        inputText:
          type: string
        tone:
          type: string
        tweets:
          type: array
          items:
            type: string
        linkedin:
          type: string
        blog:
          type: string
        hooks:
          type: array
          items:
            type: string
        captions:
          type: array
          items:
            type: string
        createdAt:
          type: string
      required:
        - id
        - inputText
        - tone
        - tweets
        - linkedin
        - blog
        - hooks
        - captions
        - createdAt
    HistoryResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/HistoryItem"
      required:
        - items
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message
